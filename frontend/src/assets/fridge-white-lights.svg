<svg width="180" height="320" viewBox="0 0 180 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Fridge body -->
  <rect x="20" y="10" width="140" height="300" rx="14" fill="#cfd4da" stroke="#8a9198" stroke-width="4"></rect>

  <!-- Door panels -->
  <rect x="35" y="35" width="110" height="70" rx="6" fill="#b9bec4"></rect>
  <rect x="35" y="120" width="110" height="80" rx="6" fill="#b9bec4"></rect>
  <rect x="35" y="215" width="110" height="70" rx="6" fill="#b9bec4"></rect>

  <!-- Shelves -->
  <line x1="35" y1="115" x2="145" y2="115" stroke="#8a9198" stroke-width="2"></line>
  <line x1="35" y1="210" x2="145" y2="210" stroke="#8a9198" stroke-width="2"></line>

  <!-- Products -->
  <rect x="50" y="65" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="65" y="65" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="80" y="65" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="95" y="65" width="10" height="18" rx="2" fill="#8a9198"></rect>

  <rect x="55" y="150" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="70" y="150" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="85" y="150" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="100" y="150" width="10" height="18" rx="2" fill="#8a9198"></rect>

  <rect x="60" y="245" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="75" y="245" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="90" y="245" width="10" height="18" rx="2" fill="#8a9198"></rect>
  <rect x="105" y="245" width="10" height="18" rx="2" fill="#8a9198"></rect>

  <!-- Handle -->
  <rect x="135" y="135" width="6" height="60" rx="3" fill="#6f757b"></rect>

  <!-- White glowing frame -->
  <rect x="30" y="20" width="120" height="280" fill="none" stroke="#ffffff" stroke-width="6" rx="10" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"></animate>
  </rect>

</svg>